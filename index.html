<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code wRapper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0efe9;
            --border: #e0dfd8;
            --border2: #ccc9bf;
            --text: #111110;
            --text2: #555550;
            --text3: #999990;
            --accent: #111110;
            --accent-light: #e8e7e0;
            --warn: #8a5c00;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wrap { width: 100%; max-width: 880px; }

        /* ── Header ── */
        header {
            display: flex;
            align-items: baseline;
            padding-bottom: 20px;
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 32px;
            gap: 12px;
        }

        header h1 {
            font-family: var(--mono);
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .version {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 1px;
        }

        /* ── Upload Row ── */
        .upload-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.12s;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            color: var(--text);
        }

        .upload-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        input[type="file"] { display: none; }

        /* ── Three Dots Loader ── */
        .loader-wrap {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 16px 0;
        }

        .loader-wrap.visible { display: flex; }

        .dots { display: flex; gap: 5px; align-items: center; }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.55); opacity: 0.25; }
            40% { transform: scale(1); opacity: 1; }
        }

        .loader-text {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
        }

        .loader-text em {
            font-style: normal;
            color: var(--text);
            font-weight: 600;
        }

        /* ── Filter Chips ── */
        .filter-section { margin-bottom: 20px; }

        .section-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .chips { display: flex; flex-wrap: wrap; gap: 6px; }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            font-family: var(--mono);
            font-size: 11.5px;
            font-weight: 500;
            border-radius: 4px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .chip:hover { border-color: var(--text); color: var(--text); background: var(--accent-light); }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .chip .count { font-size: 10px; opacity: 0.6; }

        /* ── Stats Bar ── */
        .stats-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .stat {
            padding: 9px 16px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text2);
            border-right: 1px solid var(--border);
            white-space: nowrap;
        }

        .stat:last-child { border-right: none; }
        .stat strong { color: var(--text); font-weight: 600; }
        .stat.grow { flex: 1; text-align: right; border-right: none; }
        .stat.skipped strong { color: var(--warn); }

        /* ── Output ── */
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .action-row { display: flex; gap: 7px; }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            border-radius: 5px;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.12s;
        }

        .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        #outputText {
            width: 100%;
            height: 440px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.65;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            white-space: pre;
            overflow: auto;
        }

        #outputText:focus { outline: none; border-color: var(--text); }

        .skipped-log {
            margin-top: 10px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--warn);
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.8;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17,17,16,0.3);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1.5px solid var(--border2);
            border-radius: 10px;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .modal-title {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-ext-tag {
            background: var(--accent);
            color: #fff;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }

        .modal-close:hover { background: var(--surface2); color: var(--text); }

        .modal-desc {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 16px;
            font-family: var(--mono);
        }

        .modal-file-list {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            border: 1.5px solid var(--border);
            border-radius: 6px;
        }

        .modal-file-list li {
            padding: 9px 13px;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.08s;
        }

        .modal-file-list li:last-child { border-bottom: none; }
        .modal-file-list li:hover { background: var(--surface2); color: var(--text); }
        .modal-file-list li .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .modal-file-list li .fsize { color: var(--text3); font-size: 10px; flex-shrink: 0; }

        .modal-footer {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .modal-btn.confirm { background: var(--accent); color: #fff; border: 1.5px solid var(--accent); }
        .modal-btn.confirm:hover { background: #333; border-color: #333; }
        .modal-btn.cancel { background: var(--surface); color: var(--text2); border: 1.5px solid var(--border2); }
        .modal-btn.cancel:hover { color: var(--text); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>code wRapper</h1>
        <span class="version">By Anshu Shah
        </span>
    </header>

    <div class="upload-row">
        <label class="upload-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M1 11v2a1 1 0 001 1h12a1 1 0 001-1v-2M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Select Folder
            <input type="file" id="folderInput" webkitdirectory directory multiple />
        </label>
        <label class="upload-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 2v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Select Files
            <input type="file" id="fileInput" multiple />
        </label>
    </div>

    <!-- Loader -->
    <div class="loader-wrap" id="loaderWrap">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="loader-text">Reading <em id="loaderFile">files…</em></div>
    </div>

    <!-- Filter chips -->
    <div class="filter-section" id="filterSection" style="display:none">
        <div class="section-label">Filter by extension</div>
        <div class="chips" id="chipContainer"></div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar" style="display:none">
        <div class="stat"><strong id="statFileCount">0</strong>&nbsp;files</div>
        <div class="stat"><strong id="statSizeVal">0 KB</strong></div>
        <div class="stat skipped" id="statSkipped" style="display:none"><strong id="statSkipCount">0</strong>&nbsp;skipped</div>
        <div class="stat grow" id="statusText">—</div>
    </div>

    <!-- Output -->
    <div class="output-header">
        <span class="section-label" style="margin-bottom:0">Output</span>
        <div class="action-row">
            <button class="action-btn" id="copyBtn">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                    <rect x="5" y="5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M3 11V3a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Clean Copy
            </button>
            <button class="action-btn" id="downloadBtn">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                    <path d="M8 2v8M5 7l3 3 3-3M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Download
            </button>
        </div>
    </div>

    <textarea id="outputText" placeholder="Aggregated source code will appear here…" readonly></textarea>
    <div class="skipped-log" id="skippedLog"></div>
</div>

<!-- Extension Dialog -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">
                <span class="modal-ext-tag" id="modalExt">.py</span>
                files
            </div>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-desc" id="modalDesc"></div>
        <ul class="modal-file-list" id="modalFileList"></ul>
        <div class="modal-footer">
            <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            <button class="modal-btn confirm" id="modalLoad">Load all</button>
        </div>
    </div>
</div>

<script>
    const allowedExtensions = [
        '.html','.css','.js','.ts','.jsx','.tsx','.vue','.svelte',
        '.java','.py','.pyw','.pyi','.pyx','.ipynb','.c','.cpp','.h',
        '.cs','.go','.rs','.rb','.php','.xml','.json','.yaml','.yml',
        '.md','.sql','.sh','.toml','.txt','.ini','.cfg'
    ];

    const ignoredFolders = [
        '/node_modules/','/.git/','/.idea/','/.vscode/','/__pycache__/',
        '/.pytest_cache/','/.mypy_cache/','/.tox/','/build/','/dist/',
        '/target/','/venv/','/.venv/','/env/','/.next/','/.nuxt/',
        '/vendor/','/coverage/','/bin/','/obj/','/out/'
    ];

    const ignoredFiles = [
        'package-lock.json','yarn.lock','pnpm-lock.yaml',
        'composer.lock','Gemfile.lock','poetry.lock'
    ];

    const MAX_FILE_SIZE = 512000;

    let allFiles = [], filteredFiles = [], activeExt = 'all';
    let currentFolderName = 'wrapped_code_file', modalPendingFiles = [];

    const $ = id => document.getElementById(id);
    const folderInput   = $('folderInput');
    const fileInput     = $('fileInput');
    const outputText    = $('outputText');
    const copyBtn       = $('copyBtn');
    const downloadBtn   = $('downloadBtn');
    const statusText    = $('statusText');
    const skippedLog    = $('skippedLog');
    const chipContainer = $('chipContainer');
    const filterSection = $('filterSection');
    const statsBar      = $('statsBar');
    const loaderWrap    = $('loaderWrap');
    const loaderFile    = $('loaderFile');
    const statFileCount = $('statFileCount');
    const statSizeVal   = $('statSizeVal');
    const statSkipped   = $('statSkipped');
    const statSkipCount = $('statSkipCount');
    const modalOverlay  = $('modalOverlay');
    const modalExt      = $('modalExt');
    const modalDesc     = $('modalDesc');
    const modalFileList = $('modalFileList');
    const modalClose    = $('modalClose');
    const modalCancel   = $('modalCancel');
    const modalLoad     = $('modalLoad');

    /* ── utils ── */
    const readFile = file => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsText(file);
    });

    const formatSize = b =>
        b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(2)+' MB';

    const getExt = path => { const d = path.lastIndexOf('.'); return d !== -1 ? path.substring(d).toLowerCase() : ''; };

    function cleanContent(code, ext) {
        return code.split('\n').filter(raw => {
            const t = raw.trim();
            if (!t) return false;
            if (/^\/\//.test(t)) return false;
            if (/^#/.test(t) && ext !== '.sh' && ext !== '.cfg' && ext !== '.ini') return false;
            if (/^--/.test(t)) return false;
            if (/^\/\*/.test(t) || /^\s*\*/.test(t) || /^\*\//.test(t)) return false;
            return true;
        }).join('\n');
    }

    const showLoader = v => loaderWrap.classList.toggle('visible', v);

    /* ── ingest ── */
    async function ingestFiles(files, isFolder) {
        if (!files.length) return;
        currentFolderName = isFolder && files[0].webkitRelativePath
            ? files[0].webkitRelativePath.split('/')[0]
            : 'wrapped_code_file';

        showLoader(true);
        filterSection.style.display = 'none';
        statsBar.style.display = 'none';
        outputText.value = '';
        skippedLog.innerHTML = '';
        loaderFile.textContent = 'scanning…';
        await new Promise(r => setTimeout(r, 30));

        allFiles = [];
        const skipped = [];

        for (const file of files) {
            const path = file.webkitRelativePath || file.name;
            const ext = getExt(path);
            if (isFolder && ignoredFolders.some(f => path.includes(f))) continue;
            if (!allowedExtensions.includes(ext)) continue;
            if (ignoredFiles.includes(file.name)) { skipped.push(`${path} [lockfile]`); continue; }
            if (file.name.endsWith('.min.js') || file.name.endsWith('.min.css')) { skipped.push(`${path} [minified]`); continue; }
            if (file.size > MAX_FILE_SIZE) { skipped.push(`${path} [>${formatSize(file.size)}]`); continue; }
            allFiles.push(file);
        }

        if (skipped.length) {
            statSkipped.style.display = 'flex';
            statSkipCount.textContent = skipped.length;
            skippedLog.innerHTML = skipped.map(s => `↳ ${s}`).join('<br>');
        } else {
            statSkipped.style.display = 'none';
        }

        buildChips();
        activeExt = 'all';
        filteredFiles = [...allFiles];
        await renderOutput(filteredFiles);
        showLoader(false);
        filterSection.style.display = 'block';
        statsBar.style.display = 'flex';
    }

    /* ── chips ── */
    function buildChips() {
        const extMap = {};
        for (const f of allFiles) {
            const e = getExt(f.webkitRelativePath || f.name);
            extMap[e] = (extMap[e] || 0) + 1;
        }
        chipContainer.innerHTML = `<span class="chip active" data-ext="all">all <span class="count">${allFiles.length}</span></span>`;
        Object.entries(extMap).sort((a,b)=>b[1]-a[1]).forEach(([ext, count]) => {
            const c = document.createElement('span');
            c.className = 'chip';
            c.dataset.ext = ext;
            c.innerHTML = `${ext} <span class="count">${count}</span>`;
            chipContainer.appendChild(c);
        });
        chipContainer.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => onChipClick(c)));
    }

    function setActiveChip(ext) {
        activeExt = ext;
        chipContainer.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.ext === ext));
    }

    function onChipClick(chip) {
        const ext = chip.dataset.ext;
        if (ext === 'all') {
            setActiveChip('all');
            filteredFiles = [...allFiles];
            renderOutput(filteredFiles);
        } else {
            openModal(ext);
        }
    }

    /* ── modal — no browser confirm ── */
    function openModal(ext) {
        const files = allFiles.filter(f => getExt(f.webkitRelativePath || f.name) === ext);
        modalPendingFiles = files;
        modalExt.textContent = ext;
        modalDesc.textContent = `${files.length} file${files.length !== 1 ? 's' : ''} · click a file to preview, or load all`;
        modalFileList.innerHTML = '';
        files.forEach(f => {
            const path = f.webkitRelativePath || f.name;
            const li = document.createElement('li');
            li.innerHTML = `<span class="fname" title="${path}">${path}</span><span class="fsize">${formatSize(f.size)}</span>`;
            li.addEventListener('click', () => previewFile(f));
            modalFileList.appendChild(li);
        });
        modalOverlay.classList.add('open');
    }

    async function previewFile(file) {
        const content = await readFile(file);
        outputText.value = content;
        modalOverlay.classList.remove('open');
        statusText.textContent = `preview: ${file.name}`;
        statFileCount.textContent = '1';
        statSizeVal.textContent = formatSize(file.size);
    }

    modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalCancel.addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

    // Load all — no re-confirm, just do it
    modalLoad.addEventListener('click', () => {
        const ext = modalExt.textContent;
        setActiveChip(ext);
        filteredFiles = [...modalPendingFiles];
        modalOverlay.classList.remove('open');
        renderOutput(filteredFiles);
    });

    /* ── render (line-by-line streaming) ── */
    async function renderOutput(files) {
        outputText.value = '';
        if (!files.length) {
            statusText.textContent = 'no files';
            statFileCount.textContent = '0';
            statSizeVal.textContent = '0 KB';
            return;
        }

        showLoader(true);
        statusText.textContent = 'reading…';
        let total = '', totalBytes = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const path = file.webkitRelativePath || file.name;
            loaderFile.textContent = path;

            try {
                const raw = await readFile(file);
                const lines = raw.split('\n');
                let chunk = `// ── ${path}\n`;
                for (let j = 0; j < lines.length; j++) {
                    chunk += lines[j] + '\n';
                    if (j % 300 === 299) {
                        total += chunk; chunk = '';
                        outputText.value = total;
                        outputText.scrollTop = outputText.scrollHeight;
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
                total += chunk + '\n';
                outputText.value = total;
                totalBytes += new Blob([raw]).size;
            } catch(e) { console.error(e); }
        }

        showLoader(false);
        statFileCount.textContent = files.length;
        statSizeVal.textContent = formatSize(totalBytes);
        statusText.textContent = 'done';
        outputText.scrollTop = 0;
    }

    /* ── clean copy ── */
    copyBtn.addEventListener('click', async () => {
        if (!outputText.value.trim()) { alert('Nothing to copy.'); return; }
        let cleanOutput = '';
        outputText.value.split(/^\/\/ ── /m).forEach(block => {
            if (!block.trim()) return;
            const nl = block.indexOf('\n');
            const header = block.substring(0, nl).trim();
            const body = block.substring(nl + 1);
            const cleaned = cleanContent(body, getExt(header));
            if (cleaned.trim()) cleanOutput += `// ${header}\n${cleaned}\n\n`;
        });
        try {
            await navigator.clipboard.writeText(cleanOutput.trim());
            const orig = copyBtn.innerHTML;
            copyBtn.innerHTML = '✓ Copied';
            setTimeout(() => { copyBtn.innerHTML = orig; }, 2000);
        } catch { alert('Copy failed — use Ctrl+A / Ctrl+C manually.'); }
    });

    /* ── download (manual only) ── */
    downloadBtn.addEventListener('click', () => {
        if (!outputText.value.trim()) { alert('Nothing to download.'); return; }
        const blob = new Blob([outputText.value], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${currentFolderName}_code.txt`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    /* ── input handlers ── */
    folderInput.addEventListener('change', async e => {
        await ingestFiles(Array.from(e.target.files), true);
        folderInput.value = '';
    });

    fileInput.addEventListener('change', async e => {
        await ingestFiles(Array.from(e.target.files), false);
        fileInput.value = '';
    });
</script>
</body>
</html>
