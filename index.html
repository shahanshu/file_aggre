<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code wRapper - High Performance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0efe9;
            --border: #e0dfd8;
            --border2: #ccc9bf;
            --text: #111110;
            --text2: #555550;
            --text3: #999990;
            --accent: #111110;
            --accent-light: #e8e7e0;
            --warn: #8a5c00;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wrap { width: 100%; max-width: 880px; flex: 1; }

        header {
            display: flex;
            align-items: baseline;
            padding-bottom: 20px;
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 32px;
            gap: 12px;
        }

        header h1 {
            font-family: var(--mono);
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .version {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 1px;
        }

        .upload-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.12s;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            color: var(--text);
        }

        .upload-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .upload-btn.disabled { opacity: 0.45; pointer-events: none; }

        input[type="file"] { display: none; }

        /* ── Progress Indicators ── */
        .loader-wrap {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 16px 0;
        }
        .loader-wrap.visible { display: flex; }
        .dots { display: flex; gap: 5px; align-items: center; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text); animation: pulse 1.2s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0.55); opacity: 0.25; } 40% { transform: scale(1); opacity: 1; } }
        .loader-text { font-family: var(--mono); font-size: 12px; color: var(--text2); }

        .progress-bar-wrap {
            display: none;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-wrap.visible { display: block; }
        .progress-bar { height: 100%; background: var(--text); width: 0%; transition: width 0.1s linear; }

        /* ── Chips ── */
        .filter-section { margin-bottom: 20px; }
        .section-label { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; font-family: var(--mono); font-size: 11.5px; font-weight: 500; border-radius: 4px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; user-select: none; }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .chip .count { font-size: 10px; opacity: 0.6; }

        /* ── Manifest / File List View ── */
        .output-container {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .output-header-bar {
            padding: 12px 16px;
            background: var(--surface2);
            border-bottom: 1.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .manifest-list {
            height: 320px;
            overflow-y: auto;
            padding: 8px 0;
            list-style: none;
        }

        .manifest-item {
            padding: 6px 16px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
        }

        .manifest-item:last-child { border-bottom: none; }
        .manifest-item .fsize { color: var(--text3); font-size: 10px; }

        .stats-bar {
            display: flex;
            padding: 10px 16px;
            background: #fff;
            border-top: 1.5px solid var(--border);
            font-family: var(--mono);
            font-size: 11px;
            gap: 20px;
        }
        .stat strong { color: var(--text); }

        .action-row { display: flex; gap: 8px; padding: 20px 0; justify-content: flex-end; }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            border: 1.5px solid var(--border2);
            background: var(--surface);
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .action-btn.primary:hover { background: #333; }

        .footer {
            margin-top: 40px;
            padding-bottom: 20px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
            text-align: center;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>code wRapper</h1>
        <span class="version">V2 (High Performance)</span>
    </header>

    <div class="upload-row">
        <label class="upload-btn" id="folderLabel">
             Select Folder
            <input type="file" id="folderInput" webkitdirectory directory multiple />
        </label>
        <label class="upload-btn" id="fileLabel">
             Select Files
            <input type="file" id="fileInput" multiple />
        </label>
    </div>

    <div class="loader-wrap" id="loaderWrap">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="loader-text" id="loaderText">Processing...</div>
    </div>
    <div class="progress-bar-wrap" id="progressBarWrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="filter-section" id="filterSection" style="display:none">
        <div class="section-label">Included Extensions (Multi-select)</div>
        <div class="chips" id="chipContainer"></div>
    </div>

    <div class="output-container" id="outputContainer" style="display:none">
        <div class="output-header-bar">
            <span class="section-label" style="margin:0">File Manifest (Will be wrapped)</span>
        </div>
        <ul class="manifest-list" id="manifestList"></ul>
        <div class="stats-bar">
            <div class="stat">Files: <strong id="statFileCount">0</strong></div>
            <div class="stat">Total Size: <strong id="statSizeVal">0 KB</strong></div>
        </div>
    </div>

    <div class="action-row" id="actionRow" style="display:none">
        <button class="action-btn" id="copyBtn">Clean Copy</button>
        <button class="action-btn primary" id="downloadBtn"> Download wrapped_code.txt</button>
    </div>
</div>

<div class="footer">@Developed By Anshu Shah</div>

<script>
    const allowedExtensions = ['.html','.css','.js','.ts','.jsx','.tsx','.vue','.svelte','.java','.py','.c','.cpp','.h','.cs','.go','.rs','.rb','.php','.xml','.json','.yaml','.yml','.md','.sql','.sh','.toml','.txt'];
    const ignoredFolders = ['/node_modules/','/.git/','/__pycache__/','/dist/','/build/','/.next/','/venv/'];

    let allFiles = [], filteredFiles = [];
    let activeExts = new Set(['all']);
    let currentFolderName = 'project';

    const $ = id => document.getElementById(id);
    const progressBar = $('progressBar');
    const loaderText = $('loaderText');

    /* ── Core Logic ── */

    async function ingestFiles(files, isFolder) {
        if (!files.length) return;
        currentFolderName = isFolder && files[0].webkitRelativePath ? files[0].webkitRelativePath.split('/')[0] : 'project';
        
        $('loaderWrap').classList.add('visible');
        $('progressBarWrap').classList.add('visible');
        loaderText.textContent = "Scanning files...";

        allFiles = Array.from(files).filter(file => {
            const path = file.webkitRelativePath || file.name;
            const ext = path.substring(path.lastIndexOf('.')).toLowerCase();
            const isIgnored = ignoredFolders.some(folder => path.includes(folder));
            return !isIgnored && allowedExtensions.includes(ext) && file.size < 1024 * 1024; // Limit 1MB per file for safety
        });

        activeExts = new Set(['all']);
        updateUI();
        $('loaderWrap').classList.remove('visible');
        $('progressBarWrap').classList.remove('visible');
    }

    function updateUI() {
        if (activeExts.has('all')) {
            filteredFiles = allFiles;
        } else {
            filteredFiles = allFiles.filter(f => {
                const ext = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
                return activeExts.has(ext);
            });
        }

        buildChips();
        renderManifest();
        
        $('filterSection').style.display = 'block';
        $('outputContainer').style.display = 'flex';
        $('actionRow').style.display = 'flex';
        $('statFileCount').textContent = filteredFiles.length;
        
        const totalBytes = filteredFiles.reduce((acc, f) => acc + f.size, 0);
        $('statSizeVal').textContent = (totalBytes / 1024).toFixed(1) + ' KB';
    }

    function buildChips() {
        const extMap = {};
        allFiles.forEach(f => {
            const ext = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
            extMap[ext] = (extMap[ext] || 0) + 1;
        });

        const container = $('chipContainer');
        container.innerHTML = `<span class="chip ${activeExts.has('all') ? 'active' : ''}" data-ext="all">all <span class="count">${allFiles.length}</span></span>`;
        
        Object.entries(extMap).forEach(([ext, count]) => {
            const chip = document.createElement('span');
            chip.className = `chip ${activeExts.has(ext) ? 'active' : ''}`;
            chip.innerHTML = `${ext} <span class="count">${count}</span>`;
            chip.onclick = () => {
                if (ext === 'all') {
                    activeExts.clear(); activeExts.add('all');
                } else {
                    activeExts.delete('all');
                    if (activeExts.has(ext)) activeExts.delete(ext);
                    else activeExts.add(ext);
                    if (activeExts.size === 0) activeExts.add('all');
                }
                updateUI();
            };
            container.appendChild(chip);
        });
    }

    function renderManifest() {
        const list = $('manifestList');
        list.innerHTML = filteredFiles.map(f => `
            <li class="manifest-item">
                <span>${f.webkitRelativePath || f.name}</span>
                <span class="fsize">${(f.size / 1024).toFixed(1)} KB</span>
            </li>
        `).join('');
    }

    /* ── The "Magic": On-the-fly Generation ── */

    async function generateFinalOutput(isClean = false) {
        if (!filteredFiles.length) return null;

        $('loaderWrap').classList.add('visible');
        $('progressBarWrap').classList.add('visible');
        loaderText.textContent = "Wrapping code...";
        
        let blobs = []; // We use an array of strings/blobs for memory efficiency
        const total = filteredFiles.length;

        for (let i = 0; i < total; i++) {
            const file = filteredFiles[i];
            const content = await file.text();
            const path = file.webkitRelativePath || file.name;
            
            let header = `// ── FILE: ${path} ──────────────────────\n`;
            let body = content;

            if (isClean) {
                body = body.split('\n')
                    .filter(line => line.trim() && !line.trim().startsWith('//') && !line.trim().startsWith('#'))
                    .join('\n');
            }

            blobs.push(header + body + "\n\n");
            
            // Update progress UI
            if (i % 5 === 0) {
                const pct = Math.round((i / total) * 100);
                progressBar.style.width = pct + '%';
                await new Promise(r => setTimeout(r, 0)); // Yield to UI thread
            }
        }

        $('loaderWrap').classList.remove('visible');
        $('progressBarWrap').classList.remove('visible');
        return new Blob(blobs, { type: 'text/plain' });
    }

    $('downloadBtn').onclick = async () => {
        const blob = await generateFinalOutput(false);
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentFolderName}_wrapped.txt`;
        a.click();
        URL.revokeObjectURL(url);
    };

    $('copyBtn').onclick = async () => {
        const blob = await generateFinalOutput(true);
        if (!blob) return;
        const text = await blob.text();
        try {
            await navigator.clipboard.writeText(text);
            const originalText = $('copyBtn').textContent;
            $('copyBtn').textContent = "✅ Copied!";
            setTimeout(() => $('copyBtn').textContent = originalText, 2000);
        } catch (err) {
            alert("Failed to copy. The file might be too large for the clipboard. Please use Download instead.");
        }
    };

    $('folderInput').onchange = e => ingestFiles(e.target.files, true);
    $('fileInput').onchange = e => ingestFiles(e.target.files, false);
</script>

</body>
</html>
